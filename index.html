<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareChain Social Demo</title>

<style>

body{
  margin:0;
  background:#f0f2f5;
  font-family:Arial,sans-serif;
}

.header{
  background:#6d3cc7;
  color:white;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  position:sticky;
  top:0;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.create-post{
  background:white;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

textarea{
  width:100%;
  height:80px;
  border:none;
  outline:none;
  resize:none;
  font-size:16px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  border:none;
  cursor:pointer;
}

.post-btn{
  margin-top:10px;
  width:100%;
  padding:14px;
  border-radius:12px;
  background:#6d3cc7;
  color:white;
  font-size:16px;
}

.post{
  background:white;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.user{
  font-weight:bold;
  color:#6d3cc7;
  margin-bottom:8px;
}

.need{
  color:#333;
  line-height:1.5;
  margin-bottom:10px;
}

.target{
  background:#f5f0ff;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  font-size:14px;
}

.progress{
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  height:12px;
  margin-top:8px;
}

.bar{
  background:#6d3cc7;
  height:100%;
  width:35%;
}

.actions{
  display:flex;
  justify-content:space-between;
  margin-top:12px;
}

.action-btn{
  flex:1;
  margin:4px;
  padding:12px;
  border-radius:10px;
  background:#f0f2f5;
  font-size:14px;
}

.donate{
  background:#28a745;
  color:white;
}

.comment-box{
  margin-top:10px;
}

.comment-input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

.comment{
  background:#f0f2f5;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  font-size:14px;
}

.stats{
  color:#777;
  font-size:13px;
  margin-top:8px;
}

</style>

</head>

<body>

<div class="header">
CareChain
</div>

<div class="container">

<div class="create-post">

<h3>Ajukan Bantuan</h3>

<textarea id="needText"
placeholder="Tulis kebutuhan darurat..."></textarea>

<input type="number"
id="needAmount"
placeholder="Target kebutuhan Pi">

<button class="post-btn"
onclick="createPost()">
Ajukan Sekarang
</button>

</div>

<div id="feed">

<div class="post">

<div class="user">
👩 Maria
</div>

<div class="need">
Membutuhkan bantuan biaya operasi anak dan pembelian obat.
</div>

<div class="target">
<b>Terkumpul:</b> 7 Pi dari 20 Pi

<div class="progress">
<div class="bar"></div>
</div>

</div>

<div class="stats">
👍 12 Likes • 💬 4 Komentar
</div>

<div class="actions">

<button class="action-btn"
onclick="likePost(this)">
👍 Like
</button>

<button class="action-btn"
onclick="focusComment(this)">
💬 Komentar
</button>

<button class="action-btn donate"
onclick="donateDemo()">
💜 Donasi
</button>

</div>

<div class="comment-box">

<input class="comment-input"
placeholder="Tulis komentar..."
onkeydown="addComment(event,this)">

<div class="comment">
<b>Andi:</b> Semoga cepat sembuh 🙏
</div>

<div class="comment">
<b>Sinta:</b> Saya sudah bantu sedikit 💜
</div>

</div>

</div>

</div>

</div>

<script>

function donateDemo(){

  alert(
    "Demo donasi berhasil. Terima kasih telah mendukung CareChain 💜"
  );

}

function likePost(btn){

  btn.innerHTML = "💜 Disukai";

}

function focusComment(btn){

  const post = btn.closest(".post");

  const input =
  post.querySelector(".comment-input");

  input.focus();

}

function addComment(event,input){

  if(event.key === "Enter"){

    const text = input.value;

    if(text.trim() === ""){
      return;
    }

    const comment =
    document.createElement("div");

    comment.className = "comment";

    comment.innerHTML =
    "<b>Pengguna:</b> " + text;

    input.parentElement.appendChild(comment);

    input.value = "";

  }

}

function createPost(){

  const text =
  document.getElementById("needText").value;

  const amount =
  document.getElementById("needAmount").value;

  if(text === "" || amount === ""){

    alert("Lengkapi data.");

    return;
  }

  const feed =
  document.getElementById("feed");

  const post =
  document.createElement("div");

  post.className = "post";

  post.innerHTML = `

  <div class="user">
  🧑 Pengguna CareChain
  </div>

  <div class="need">
  ${text}
  </div>

  <div class="target">
  <b>Terkumpul:</b> 0 Pi dari ${amount} Pi

  <div class="progress">
  <div class="bar" style="width:0%"></div>
  </div>

  </div>

  <div class="stats">
  👍 0 Likes • 💬 0 Komentar
  </div>

  <div class="actions">

  <button class="action-btn"
  onclick="likePost(this)">
  👍 Like
  </button>

  <button class="action-btn"
  onclick="focusComment(this)">
  💬 Komentar
  </button>

  <button class="action-btn donate"
  onclick="donateDemo()">
  💜 Donasi
  </button>

  </div>

  <div class="comment-box">

  <input class="comment-input"
  placeholder="Tulis komentar..."
  onkeydown="addComment(event,this)">

  </div>

  `;

  feed.prepend(post);

  document.getElementById("needText").value = "";
  document.getElementById("needAmount").value = "";

}

</script>

</body>
</html>
