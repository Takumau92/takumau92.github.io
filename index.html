here<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CareChain</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body{
font-family:Arial,sans-serif;
max-width:700px;
margin:auto;
padding:20px;
}
.card{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
margin-top:15px;
}
button{
padding:10px 15px;
font-size:16px;
}
</style>
</head>

<body>

<h1>CareChain</h1>
<p>Community support powered by Pi Network.</p>

<button onclick="loginPi()">Login With Pi</button>

<p id="user"></p>

<div class="card">
<h3>Bantuan Pendidikan</h3>
<p>Membantu siswa yang kesulitan biaya sekolah.</p>
<p>Target: 100 Pi</p>
<button>Donasi Pi</button>
</div>

<script>
Pi.init({ version: "2.0", sandbox: true });

async function loginPi() {
try {
const scopes = ['username'];
const auth = await Pi.authenticate(scopes, function(){});
document.getElementById("user").innerHTML =
"Login berhasil: " + auth.user.username;
} catch(e){
console.log(e);
}
}
</script>

</body>
</html>
