
<!DOCTYPE html>
<html>
<head>
  <title>Carechain</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #e9ebee;
    }

    /* HEADER */
    .header {
      background: #1877f2;
      color: white;
      padding: 12px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    /* NAV */
    .nav {
      display: flex;
    }

    .nav button {
      flex: 1;
      padding: 10px;
      border: none;
      background: #fff;
      cursor: pointer;
      font-weight: bold;
    }

    .nav button:hover {
      background: #f0f0f0;
    }

    /* POST CARD */
    .card {
      background: white;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .badge {
      display: inline-block;
      background: #f1f1f1;
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 12px;
    }

    img, video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      width: 100%;
      margin-top: 8px;
      cursor: pointer;
    }

    .donate-btn {
      background: #42b72a;
      color: white;
    }

    .admin-btn {
      background: #333;
      color: white;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .page { display: none; }
    .active { display: block; }

    .progress {
      background: #ddd;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 5px;
    }

    .bar {
      height: 10px;
      background: #42b72a;
      width: 0%;
    }
  </style>
</head>

<body>

<div class="header">Carechain</div>

<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('submit')">Ajukan</button>
  <button onclick="showPage('admin')">Dashboard</button>
</div>

<!-- HOME FEED -->
<div id="home" class="page active"></div>

<!-- SUBMIT -->
<div id="submit" class="page">
  <div class="card">
    <h3>Ajukan Bantuan</h3>

    <input id="name" placeholder="Nama">
    <input id="title" placeholder="Judul Kasus">
    <textarea id="desc" placeholder="Deskripsi masalah"></textarea>
    <input id="cost" placeholder="Estimasi biaya (Pi)">
    <input type="file" id="img">

    <button onclick="addPost()" class="donate-btn">Kirim</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin" class="page">
  <div class="card">
    <h3>Carechain Dashboard</h3>
    <input type="password" id="pass" placeholder="Password admin">
    <button onclick="loginAdmin()">Login</button>
  </div>

  <div id="adminPanel"></div>
</div>

<script>
let posts = [];
let admin = false;

/* NAV */
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* ADD POST */
function addPost(){
  let name = document.getElementById("name").value;
  let title = document.getElementById("title").value;
  let desc = document.getElementById("desc").value;
  let cost = document.getElementById("cost").value;
  let imgFile = document.getElementById("img").files[0];

  if(!name || !title || !desc){
    alert("Isi lengkap dulu");
    return;
  }

  let imgURL = imgFile ? URL.createObjectURL(imgFile) : "";

  posts.push({
    name,
    title,
    desc,
    cost,
    img: imgURL,
    raised: 0,
    status: "active"
  });

  alert("Berhasil dikirim");
  render();
}

/* DONATE (SIMULATION / PI READY PLACEHOLDER) */
function donate(i){
  let amount = prompt("Masukkan jumlah donasi (Pi):");
  if(!amount) return;

  posts[i].raised += parseInt(amount);

  alert("Donasi simulasi: " + amount + " Pi (nanti diganti Pi SDK real)");
  render();
}

/* ADMIN LOGIN */
function loginAdmin(){
  let pass = document.getElementById("pass").value;
  if(pass === "292603$"){
    admin = true;
    alert("Login berhasil");
    renderAdmin();
  } else {
    alert("Password salah");
  }
}

/* ADMIN ACTION */
function closeCase(i){
  posts[i].status = "closed";
  render();
  renderAdmin();
}

/* RENDER HOME */
function render(){
  let html = "";

  posts.forEach((p,i)=>{
    html += `
    <div class="card">
      <span class="badge">${p.status}</span>
      <h3>${p.title}</h3>
      <b>${p.name}</b>
      <p>${p.desc}</p>

      ${p.img ? `<img src="${p.img}">` : ""}

      <p>Target: ${p.cost} Pi</p>
      <p>Terkumpul: ${p.raised} Pi</p>

      <div class="progress">
        <div class="bar" style="width:${Math.min((p.raised/p.cost)*100,100)}%"></div>
      </div>

      <button class="donate-btn" onclick="donate(${i})">Donasi Pi</button>
    </div>
    `;
  });

  document.getElementById("home").innerHTML = html;
}

/* RENDER ADMIN */
function renderAdmin(){
  if(!admin) return;

  let html = "";

  posts.forEach((p,i)=>{
    html += `
    <div class="card">
      <h3>${p.title}</h3>
      <p>Status: ${p.status}</p>
      <p>Terkumpul: ${p.raised} / ${p.cost} Pi</p>

      <button class="admin-btn" onclick="closeCase(${i})">
        Tandai Selesai
      </button>
    </div>
    `;
  });

  document.getElementById("adminPanel").innerHTML = html;
}

/* INIT */
render();
</script>

</body>
</html>
